spring:
  application:
    name: ai-code-generate
  profiles:
    active: local
  # mysql
  datasource:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/ai_code_generate
      username: root
      password: 123456
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      ttl: 3600
server:
  port: 8123
  servlet:
    context-path: /api
    session:
      timeout: 7d
      cookie:
        max-age: 7d


# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.xhl.aicodegenerate.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
