spring:
  application:
    name: ai-code-generate
  profiles:
    active: local
  session:
    store-type: redis
    timeout: 2592000
  # mysql
  datasource:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/ai_code_generate
      username: root
      password: 123456
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      # AI 对话记忆 Redis 过期时间，单位秒；0 表示永不过期
      ttl: 2592000
server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000


# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.xhl.aicodegenerate.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
